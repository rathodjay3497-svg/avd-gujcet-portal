service: gujcet-platform-api

frameworkVersion: "3"

plugins:
  - serverless-python-requirements

provider:
  name: aws
  runtime: python3.11
  region: ap-south-1
  memorySize: 256
  timeout: 15
  architecture: x86_64
  environment:
    AWS_REGION: ${self:provider.region}
    DYNAMODB_TABLE_NAME: ${self:custom.tableName}
    ENVIRONMENT: ${sls:stage}
    FRONTEND_URL: ${env:FRONTEND_URL, 'http://localhost:5173'}
    FRONTEND_CUSTOM_URL: ${env:FRONTEND_CUSTOM_URL, ''}
    COOKIE_SAMESITE: ${env:COOKIE_SAMESITE, 'lax'}
    JWT_SECRET_KEY: ${env:JWT_SECRET_KEY, 'change-me-in-production'}
    JWT_ALGORITHM: ${env:JWT_ALGORITHM, 'HS256'}
    JWT_EXPIRY_HOURS: ${env:JWT_EXPIRY_HOURS, '24'}
    ADMIN_JWT_EXPIRY_HOURS: ${env:ADMIN_JWT_EXPIRY_HOURS, '8'}
    ADMIN_USERNAME: ${env:ADMIN_USERNAME, 'admin'}
    ADMIN_PASSWORD_HASH: ${env:ADMIN_PASSWORD_HASH, ''}
    TWILIO_ACCOUNT_SID: ${env:TWILIO_ACCOUNT_SID, ''}
    TWILIO_AUTH_TOKEN: ${env:TWILIO_AUTH_TOKEN, ''}
    TWILIO_PHONE_NUMBER: ${env:TWILIO_PHONE_NUMBER, ''}
    SES_SENDER_EMAIL: ${env:SES_SENDER_EMAIL, 'noreply@yourdomain.com'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - !GetAtt GujcetTable.Arn
            - !Join ["", [!GetAtt GujcetTable.Arn, "/index/*"]]
        - Effect: Allow
          Action:
            - ses:SendEmail
          Resource: "*"
  httpApi:
    cors:
      allowedOrigins:
        - ${env:FRONTEND_URL, 'http://localhost:5173'}
        - ${env:FRONTEND_CUSTOM_URL, ''}
      allowedHeaders:
        - Content-Type
        - Authorization
        - Cookie
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowCredentials: true
      exposedResponseHeaders:
        - Set-Cookie

custom:
  tableName: gujcet-platform-${sls:stage}
  pythonRequirements:
    dockerizePip: true
    slim: true
    noDeploy:
      - boto3
      - botocore

functions:
  api:
    handler: app.main.handler
    events:
      - httpApi: "*"

resources:
  Resources:
    GujcetTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      Properties:
        TableName: ${self:custom.tableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: entity_type
            AttributeType: S
          - AttributeName: created_at
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: GSI2
            KeySchema:
              - AttributeName: entity_type
                KeyType: HASH
              - AttributeName: created_at
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        TimeToLiveSpecification:
          AttributeName: expires_at
          Enabled: true

